<svg width="1800" height="1280" viewBox="0 0 1800 1280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#F7F8FC"/>
    </linearGradient>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E9F3FF"/>
      <stop offset="1" stop-color="#DDEBFF"/>
    </linearGradient>
    <linearGradient id="panelGreen" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EBFAF3"/>
      <stop offset="1" stop-color="#D7F4E5"/>
    </linearGradient>
    <linearGradient id="panelOrange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF4E7"/>
      <stop offset="1" stop-color="#FFE8C9"/>
    </linearGradient>
    <linearGradient id="panelPurple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F4EEFF"/>
      <stop offset="1" stop-color="#E7DBFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#274C7718"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#5B6B85"/>
    </marker>
    <style>
      .title { font: 700 36px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #183153; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #516076; }
      .group { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #244265; }
      .nodeTitle { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #183153; }
      .nodeBody { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536174; }
      .small { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4C5A6B; }
      .muted { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6C7889; }
      .chip { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #355278; }
      .line { stroke: #5B6B85; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .dashed { stroke-dasharray: 8 8; }
      .panel { fill: white; stroke: #D8E2F0; stroke-width: 2; rx: 26; filter: url(#shadow); }
      .node { fill: white; stroke: #C8D7EA; stroke-width: 2; rx: 18; filter: url(#shadow); }
    </style>
  </defs>

  <rect width="1800" height="1280" fill="url(#bg)"/>

  <text x="80" y="80" class="title">Sky Chat 项目流程图</text>
  <text x="80" y="114" class="subtitle">主线：用户发消息 → 前端状态 → /api/chat → 服务端 AI / 工具调用 → SSE 回前端 → 入库</text>

  <!-- Frontend group -->
  <rect x="60" y="150" width="510" height="720" rx="28" fill="url(#panelBlue)" stroke="#C8DCF8" stroke-width="2"/>
  <text x="88" y="195" class="group">前端 Next.js App</text>

  <rect x="95" y="225" width="180" height="92" class="node"/>
  <text x="118" y="257" class="nodeTitle">用户 / 浏览器</text>
  <text x="118" y="282" class="nodeBody">打开聊天页</text>
  <text x="118" y="304" class="nodeBody">输入消息 / 点击发送</text>

  <rect x="320" y="225" width="210" height="120" class="node"/>
  <text x="343" y="257" class="nodeTitle">聊天页面</text>
  <text x="343" y="282" class="nodeBody">app/chat/[conversationId]/page.tsx</text>
  <text x="343" y="304" class="nodeBody">渲染 Header / MessageList / ChatInput</text>
  <text x="343" y="326" class="nodeBody">首次进入时加载历史消息</text>

  <rect x="95" y="390" width="200" height="128" class="node"/>
  <text x="118" y="422" class="nodeTitle">ChatService</text>
  <text x="118" y="447" class="nodeBody">发送消息</text>
  <text x="118" y="469" class="nodeBody">发起 /api/chat</text>
  <text x="118" y="491" class="nodeBody">解析 SSE / 处理中断</text>

  <rect x="330" y="390" width="200" height="128" class="node"/>
  <text x="353" y="422" class="nodeTitle">Chat Store</text>
  <text x="353" y="447" class="nodeBody">消息列表</text>
  <text x="353" y="469" class="nodeBody">流式状态 / thinking</text>
  <text x="353" y="491" class="nodeBody">tool 状态机</text>

  <rect x="95" y="565" width="200" height="120" class="node"/>
  <text x="118" y="597" class="nodeTitle">Conversation Store</text>
  <text x="118" y="622" class="nodeBody">会话列表</text>
  <text x="118" y="644" class="nodeBody">创建 / 删除 / 置顶 / 搜索</text>

  <rect x="330" y="565" width="200" height="120" class="node"/>
  <text x="353" y="597" class="nodeTitle">MonitorProvider</text>
  <text x="353" y="622" class="nodeBody">初始化前端监控 SDK</text>
  <text x="353" y="644" class="nodeBody">记录 trace / 工具调用 / 性能</text>

  <rect x="95" y="730" width="435" height="100" class="node"/>
  <text x="118" y="762" class="nodeTitle">附加能力</text>
  <text x="118" y="787" class="nodeBody">文件上传 / 文本转语音 / 图片生成弹窗 / 会话分享 / Markdown 导出</text>
  <text x="118" y="809" class="nodeBody">对应 app/api/upload, /api/tts, /api/image/generate, /api/share, /api/export</text>

  <!-- Server/API group -->
  <rect x="630" y="150" width="620" height="860" rx="28" fill="url(#panelGreen)" stroke="#BFE5D0" stroke-width="2"/>
  <text x="658" y="195" class="group">服务端 API 与业务层</text>

  <rect x="665" y="225" width="240" height="115" class="node"/>
  <text x="688" y="257" class="nodeTitle">/api/chat</text>
  <text x="688" y="282" class="nodeBody">app/api/chat/route.ts</text>
  <text x="688" y="304" class="nodeBody">校验用户 / 取 API Key / 调用 ChatService</text>

  <rect x="955" y="225" width="255" height="115" class="node"/>
  <text x="978" y="257" class="nodeTitle">认证入口</text>
  <text x="978" y="282" class="nodeBody">middleware.ts</text>
  <text x="978" y="304" class="nodeBody">NextAuth + getCurrentUserId</text>

  <rect x="665" y="390" width="545" height="150" class="node"/>
  <text x="688" y="422" class="nodeTitle">server/services/chat/chat.service.ts</text>
  <text x="688" y="447" class="nodeBody">1. 获取或创建会话</text>
  <text x="688" y="469" class="nodeBody">2. 预创建 user / assistant 消息</text>
  <text x="688" y="491" class="nodeBody">3. 构建上下文和工具定义</text>
  <text x="688" y="513" class="nodeBody">4. 请求 SiliconFlow，返回基础 SSE 或支持 tool calling 的 SSE</text>

  <rect x="665" y="590" width="255" height="120" class="node"/>
  <text x="688" y="622" class="nodeTitle">prompt.builder</text>
  <text x="688" y="647" class="nodeBody">拼系统提示词</text>
  <text x="688" y="669" class="nodeBody">拼历史消息和附件内容</text>

  <rect x="955" y="590" width="255" height="120" class="node"/>
  <text x="978" y="622" class="nodeTitle">toolRegistry</text>
  <text x="978" y="647" class="nodeBody">ensureToolsReady()</text>
  <text x="978" y="669" class="nodeBody">web_search / generate_image</text>

  <rect x="665" y="760" width="545" height="170" class="node"/>
  <text x="688" y="792" class="nodeTitle">stream.handler</text>
  <text x="688" y="817" class="nodeBody">读取 SiliconFlow 流式响应</text>
  <text x="688" y="839" class="nodeBody">实时拆分 thinking / answer / tool_calls</text>
  <text x="688" y="861" class="nodeBody">工具可并行执行，结果回填给下一轮模型请求</text>
  <text x="688" y="883" class="nodeBody">最终调用 persistMessage 保存 content / thinking / toolCalls / toolResults</text>
  <text x="688" y="905" class="nodeBody">通过 SSE 把增量 chunk 发回前端</text>

  <!-- Data and externals group -->
  <rect x="1310" y="150" width="430" height="860" rx="28" fill="url(#panelOrange)" stroke="#F0D4A7" stroke-width="2"/>
  <text x="1338" y="195" class="group">外部服务与数据层</text>

  <rect x="1345" y="225" width="360" height="115" class="node"/>
  <text x="1368" y="257" class="nodeTitle">SiliconFlow Chat API</text>
  <text x="1368" y="282" class="nodeBody">server/services/ai/siliconflow.ts</text>
  <text x="1368" y="304" class="nodeBody">流式返回 content / reasoning_content / tool_calls</text>

  <rect x="1345" y="390" width="170" height="120" class="node"/>
  <text x="1368" y="422" class="nodeTitle">web_search</text>
  <text x="1368" y="447" class="nodeBody">Tavily</text>
  <text x="1368" y="469" class="nodeBody">搜索结果回模型</text>

  <rect x="1535" y="390" width="170" height="120" class="node"/>
  <text x="1558" y="422" class="nodeTitle">generate_image</text>
  <text x="1558" y="447" class="nodeBody">SiliconFlow Image</text>
  <text x="1558" y="469" class="nodeBody">下载后存本地</text>

  <rect x="1345" y="560" width="360" height="140" class="node"/>
  <text x="1368" y="592" class="nodeTitle">Prisma + PostgreSQL</text>
  <text x="1368" y="617" class="nodeBody">schema.prisma</text>
  <text x="1368" y="639" class="nodeBody">User / Conversation / Message / MonitorEvent</text>
  <text x="1368" y="661" class="nodeBody">会话、消息、认证账户、监控事件统一落库</text>

  <rect x="1345" y="750" width="360" height="145" class="node"/>
  <text x="1368" y="782" class="nodeTitle">Repository 层</text>
  <text x="1368" y="807" class="nodeBody">ConversationRepository</text>
  <text x="1368" y="829" class="nodeBody">MessageRepository / UserRepository</text>
  <text x="1368" y="851" class="nodeBody">给 route / server action / service 复用</text>

  <!-- Bottom auth/actions/monitor groups -->
  <rect x="60" y="930" width="560" height="280" rx="28" fill="url(#panelPurple)" stroke="#D9CCF4" stroke-width="2"/>
  <text x="88" y="975" class="group">会话管理与认证</text>

  <rect x="95" y="1010" width="245" height="145" class="node"/>
  <text x="118" y="1042" class="nodeTitle">Server Actions</text>
  <text x="118" y="1067" class="nodeBody">app/actions/conversation.ts</text>
  <text x="118" y="1089" class="nodeBody">创建会话 / 删除会话 / 改标题 / 置顶 / 分享</text>
  <text x="118" y="1111" class="nodeBody">列表页主要走这里，不是全走 REST</text>

  <rect x="370" y="1010" width="215" height="145" class="node"/>
  <text x="393" y="1042" class="nodeTitle">NextAuth</text>
  <text x="393" y="1067" class="nodeBody">/api/auth/[...nextauth]</text>
  <text x="393" y="1089" class="nodeBody">Google / GitHub / Credentials</text>
  <text x="393" y="1111" class="nodeBody">兼容旧 JWT token 读取</text>

  <rect x="680" y="1050" width="530" height="160" rx="28" fill="#F4FBF6" stroke="#CFE7D8" stroke-width="2"/>
  <text x="708" y="1093" class="group">SSE 回流到前端后的表现</text>
  <text x="708" y="1133" class="nodeBody">ChatService 解析 chunk，持续更新 Chat Store</text>
  <text x="708" y="1160" class="nodeBody">MessageList 实时渲染 thinking / answer / tool progress / 图片结果</text>

  <rect x="1270" y="1050" width="470" height="160" rx="28" fill="#FFF8EE" stroke="#F0DDB9" stroke-width="2"/>
  <text x="1298" y="1093" class="group">监控链路</text>
  <text x="1298" y="1133" class="nodeBody">MainLayout 中包裹 MonitorProvider</text>
  <text x="1298" y="1160" class="nodeBody">前端 SDK 上报到 /api/monitor，事件落到 MonitorEvent 表</text>
  <text x="1298" y="1187" class="nodeBody">完整监控平台源码位于 sky-monitor-sdk/ 子项目</text>

  <!-- Connectors -->
  <path d="M275 271H320" class="line"/>
  <path d="M425 345V390" class="line"/>
  <path d="M275 454H330" class="line"/>
  <path d="M195 317V390" class="line"/>
  <path d="M195 518V565" class="line"/>
  <path d="M430 518V565" class="line"/>

  <path d="M530 454H665" class="line"/>
  <path d="M530 625C585 625 585 625 640 625C655 625 655 625 665 625" class="line"/>

  <path d="M905 282H955" class="line"/>
  <path d="M1082 340V390" class="line"/>
  <path d="M785 340V390" class="line"/>

  <path d="M937 465C955 465 955 465 970 465C985 465 985 465 985 590" class="line"/>
  <path d="M785 540V590" class="line"/>
  <path d="M1082 540V590" class="line"/>

  <path d="M1210 282H1345" class="line"/>
  <path d="M1210 650H1295C1320 650 1320 630 1345 630" class="line"/>
  <path d="M1082 710V760" class="line"/>
  <path d="M785 710V760" class="line"/>
  <path d="M1200 845H1275C1305 845 1305 822 1345 822" class="line"/>
  <path d="M1525 510V560" class="line"/>

  <path d="M1430 340V390" class="line"/>
  <path d="M1620 340V390" class="line"/>
  <path d="M1515 700V750" class="line"/>

  <path d="M665 845H605C565 845 565 454 530 454" class="line dashed"/>
  <path d="M1210 845H1250C1290 845 1290 282 1345 282" class="line dashed"/>

  <path d="M340 1082H370" class="line"/>
  <path d="M220 830V1010" class="line"/>
  <path d="M430 685V1010" class="line dashed"/>
  <path d="M940 930V1050" class="line"/>
  <path d="M430 625H665" class="line dashed"/>
  <path d="M530 787H645C655 787 655 787 665 787" class="line dashed"/>

  <path d="M430 625C510 625 510 625 590 625C620 625 620 1070 680 1070" class="line dashed"/>
  <path d="M430 625C510 625 510 625 590 625C635 625 635 1138 680 1138" class="line dashed"/>

  <path d="M430 625C520 625 520 625 610 625C660 625 660 1095 1270 1095" class="line dashed"/>
  <path d="M430 625C520 625 520 625 610 625C700 625 700 1168 1270 1168" class="line dashed"/>

  <!-- Legend -->
  <rect x="1320" y="60" width="420" height="58" rx="18" fill="white" stroke="#D8E2F0" stroke-width="2"/>
  <rect x="1346" y="80" width="18" height="8" rx="4" fill="#5B6B85"/>
  <text x="1378" y="88" class="small">实线：主数据流</text>
  <rect x="1502" y="80" width="18" height="8" rx="4" fill="#5B6B85"/>
  <line x1="1502" y1="84" x2="1520" y2="84" stroke="#F7F8FC" stroke-width="2"/>
  <text x="1534" y="88" class="small">虚线：辅助链路 / 依赖关系</text>
</svg>
